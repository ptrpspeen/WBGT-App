apiVersion: apps/v1
kind: Deployment
metadata:
  name: wbgt-frontend
  labels:
    app.kubernetes.io/name: wbgt-frontend
    app.kubernetes.io/part-of: wbgt
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: wbgt-frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: wbgt-frontend
        app.kubernetes.io/part-of: wbgt
    spec:
      containers:
        - name: frontend
          image: ghcr.io/ptrpspeen/wbgt-frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
