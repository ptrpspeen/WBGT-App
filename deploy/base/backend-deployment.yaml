apiVersion: apps/v1
kind: Deployment
metadata:
  name: wbgt-backend
  labels:
    app.kubernetes.io/name: wbgt-backend
    app.kubernetes.io/part-of: wbgt
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: wbgt-backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: wbgt-backend
        app.kubernetes.io/part-of: wbgt
    spec:
      containers:
        - name: backend
          image: ghcr.io/ptrpspeen/wbgt-backend:latest
          imagePullPolicy: Always
          env:
            - name: PORT
              value: "10000"
          ports:
            - name: http
              containerPort: 10000
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 60
            periodSeconds: 20
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 2Gi
